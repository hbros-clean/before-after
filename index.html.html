<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>B/A — Before After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --fg: #f5f5f0;
    --muted: #6b6b66;
    --line: rgba(245,245,240,0.1);
    --accent: #d4ff3a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Fraunces', serif;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* HEADER */
  header {
    padding: max(env(safe-area-inset-top), 16px) 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
  }
  header h1 .slash { color: var(--accent); }
  header .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* SCREENS */
  .screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* === CAPTURE SCREEN === */
  .capture-area {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--line);
  }

  .slot {
    position: relative;
    background: var(--bg);
    overflow: hidden;
    cursor: pointer;
    transition: background 0.2s;
  }
  .slot:active { background: var(--surface); }

  .slot-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .slot.filled .slot-bg { opacity: 0.5; }

  .slot-overlay {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 20px;
  }

  .slot.filled .slot-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,10,10,0.3), rgba(10,10,10,0.7));
  }

  .slot-overlay > * { position: relative; z-index: 1; }

  .slot-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .slot.filled .slot-tag { color: var(--accent); }

  .slot-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 72px;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  .slot-action {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border: 1px solid var(--fg);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(10,10,10,0.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .slot-action svg { width: 14px; height: 14px; }

  .slot.filled .slot-action {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  /* CAPTURE BOTTOM BAR */
  .capture-bar {
    padding: 14px 20px max(env(safe-area-inset-bottom), 16px);
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--line);
    background: var(--bg);
    flex-shrink: 0;
  }

  .name-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    border-radius: 0;
    outline: none;
  }
  .name-input::placeholder { color: var(--muted); }
  .name-input:focus { border-color: var(--accent); }

  /* BUTTONS */
  button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 12px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
  }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: default; }
  button.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  button.ghost { border-color: var(--line); }
  button svg { width: 13px; height: 13px; }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 14px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-align: center;
    cursor: pointer;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--fg);
    border-bottom-color: var(--accent);
  }

  /* === GALLERY === */
  .gallery {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .gallery-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
  }
  .gallery-empty .big {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 48px;
    font-weight: 300;
    color: var(--fg);
  }
  .gallery-empty .small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  .pair-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .pair-card {
    background: var(--surface);
    border: 1px solid var(--line);
    overflow: hidden;
    cursor: pointer;
  }
  .pair-card:active { border-color: var(--accent); }

  .pair-thumb {
    position: relative;
    aspect-ratio: 2 / 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--bg);
  }
  .pair-thumb .half {
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .pair-thumb .half::after {
    content: attr(data-label);
    position: absolute;
    top: 8px;
    left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 4px 8px;
    color: var(--fg);
  }

  .pair-meta {
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pair-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 400;
    font-style: italic;
  }
  .pair-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* === DETAIL / COMPARE === */
  .detail-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .detail-screen.active { display: flex; }

  .detail-header {
    padding: max(env(safe-area-inset-top), 14px) 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    gap: 12px;
  }
  .detail-title {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 400;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .icon-btn {
    background: transparent;
    border: none;
    padding: 8px;
    color: var(--fg);
    cursor: pointer;
  }
  .icon-btn svg { width: 20px; height: 20px; }

  .compare {
    flex: 1;
    position: relative;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    background: #000;
  }
  .img-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .img-wrap.after-wrap { clip-path: inset(0 0 0 50%); }

  .divider {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    background: var(--fg);
    transform: translateX(-1px);
    pointer-events: none;
    box-shadow: 0 0 16px rgba(0,0,0,0.5);
  }
  .handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .handle::before, .handle::after {
    content: '';
    width: 7px;
    height: 7px;
    border-top: 2px solid var(--bg);
    border-right: 2px solid var(--bg);
    position: absolute;
  }
  .handle::before { transform: rotate(-135deg); margin-right: 12px; }
  .handle::after { transform: rotate(45deg); margin-left: 12px; }

  .label-tag {
    position: absolute;
    top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 5px 10px;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
  }
  .label-before { left: 14px; }
  .label-after { right: 14px; color: var(--accent); border-color: var(--accent); }

  .detail-actions {
    padding: 14px 16px max(env(safe-area-inset-bottom), 16px);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fg);
    color: var(--bg);
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* CONFIRM MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 24px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 24px;
    max-width: 320px;
    width: 100%;
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .modal p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-actions button { flex: 1; }

  input[type="file"] { display: none; }

  /* Scrollbar */
  .gallery::-webkit-scrollbar { width: 4px; }
  .gallery::-webkit-scrollbar-thumb { background: var(--line); }
</style>
</head>
<body>

<header>
  <h1>B<span class="slash">/</span>A</h1>
  <span class="count" id="pairCount">00 PAIRS</span>
</header>

<div class="tabs">
  <div class="tab active" data-screen="capture">Capture</div>
  <div class="tab" data-screen="gallery">Gallery</div>
</div>

<!-- CAPTURE SCREEN -->
<div class="screen active" id="screen-capture">
  <div class="capture-area">
    <div class="slot" id="slotBefore">
      <div class="slot-bg" id="bgBefore"></div>
      <div class="slot-overlay">
        <span class="slot-tag">01 — 시작 전</span>
        <span class="slot-label">Before</span>
        <span class="slot-action" id="actionBefore">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          촬영하기
        </span>
      </div>
    </div>
    <div class="slot" id="slotAfter">
      <div class="slot-bg" id="bgAfter"></div>
      <div class="slot-overlay">
        <span class="slot-tag">02 — 완료 후</span>
        <span class="slot-label">After</span>
        <span class="slot-action" id="actionAfter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          촬영하기
        </span>
      </div>
    </div>
  </div>

  <div class="capture-bar">
    <input type="text" class="name-input" id="pairName" placeholder="이름 (예: 거실 정리)" maxlength="40">
    <button class="primary" id="btnSave" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
      </svg>
      저장
    </button>
  </div>
</div>

<!-- GALLERY SCREEN -->
<div class="screen" id="screen-gallery">
  <div class="gallery" id="gallery">
    <div class="gallery-empty" id="galleryEmpty">
      <span class="big">empty</span>
      <span class="small">아직 저장된 짝이 없어요</span>
    </div>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div class="detail-screen" id="detailScreen">
  <div class="detail-header">
    <button class="icon-btn" id="btnDetailClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
    <span class="detail-title" id="detailTitle"></span>
  </div>

  <div class="compare" id="compare">
    <div class="img-wrap before-wrap"><img id="imgBefore"></div>
    <div class="img-wrap after-wrap" id="afterWrap"><img id="imgAfter"></div>
    <span class="label-tag label-before">BEFORE</span>
    <span class="label-tag label-after">AFTER</span>
    <div class="divider" id="divider"></div>
    <div class="handle" id="handle"></div>
  </div>

  <div class="detail-actions">
    <button id="btnDownloadBefore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Before
    </button>
    <button id="btnDownloadAfter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      After
    </button>
    <button id="btnDelete" class="ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
      삭제
    </button>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <h3>정말 삭제할까요?</h3>
    <p>이 짝의 비포/애프터 사진이 모두 사라져요. 되돌릴 수 없어요.</p>
    <div class="modal-actions">
      <button id="btnCancelDelete" class="ghost">취소</button>
      <button id="btnConfirmDelete" class="primary">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden file inputs (use capture to open camera on mobile) -->
<input type="file" id="fileBefore" accept="image/*" capture="environment">
<input type="file" id="fileAfter" accept="image/*" capture="environment">

<script>
  // ============ STATE ============
  const state = {
    current: { before: null, after: null },
    pairs: [], // {id, name, before, after, createdAt}
    activePairId: null,
  };

  const $ = id => document.getElementById(id);

  // ============ STORAGE ============
  const storage = {
    available: typeof window !== 'undefined' && window.storage,
    async getList() {
      if (!this.available) return [];
      try {
        const r = await window.storage.get('pairs:list');
        return r ? JSON.parse(r.value) : [];
      } catch { return []; }
    },
    async setList(list) {
      if (!this.available) return;
      try { await window.storage.set('pairs:list', JSON.stringify(list)); } catch {}
    },
    async getPair(id) {
      if (!this.available) return null;
      try {
        const r = await window.storage.get('pair:' + id);
        return r ? JSON.parse(r.value) : null;
      } catch { return null; }
    },
    async setPair(pair) {
      if (!this.available) return;
      try { await window.storage.set('pair:' + pair.id, JSON.stringify(pair)); } catch (e) { console.warn(e); }
    },
    async deletePair(id) {
      if (!this.available) return;
      try { await window.storage.delete('pair:' + id); } catch {}
    }
  };

  // ============ IMAGE RESIZE ============
  function resizeImage(file, maxDim = 1800, quality = 0.85) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          const ratio = Math.min(1, maxDim / Math.max(width, height));
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ============ CAPTURE FLOW ============
  async function handleFile(which, file) {
    if (!file) return;
    showToast('처리 중…');
    try {
      const dataUrl = await resizeImage(file);
      state.current[which] = dataUrl;
      const bg = $('bg' + cap(which));
      bg.style.backgroundImage = `url(${dataUrl})`;
      $('slot' + cap(which)).classList.add('filled');
      $('action' + cap(which)).innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        다시 찍기`;
      updateSaveButton();
      hideToast();
    } catch (e) {
      showToast('오류 발생');
    }
  }

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  $('slotBefore').addEventListener('click', () => $('fileBefore').click());
  $('slotAfter').addEventListener('click', () => $('fileAfter').click());
  $('fileBefore').addEventListener('change', e => { handleFile('before', e.target.files[0]); e.target.value = ''; });
  $('fileAfter').addEventListener('change', e => { handleFile('after', e.target.files[0]); e.target.value = ''; });

  function updateSaveButton() {
    const ready = state.current.before && state.current.after;
    $('btnSave').disabled = !ready;
  }

  // ============ SAVE PAIR ============
  $('btnSave').addEventListener('click', async () => {
    if (!state.current.before || !state.current.after) return;
    const nameInput = $('pairName').value.trim();
    const name = nameInput || `짝 ${String(state.pairs.length + 1).padStart(2, '0')}`;
    const id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const pair = {
      id,
      name,
      before: state.current.before,
      after: state.current.after,
      createdAt: Date.now(),
    };
    await storage.setPair(pair);
    state.pairs.unshift(pair);
    await storage.setList(state.pairs.map(p => p.id));
    resetCapture();
    renderGallery();
    updateCount();
    showToast(`'${name}' 저장됨`);
  });

  function resetCapture() {
    state.current = { before: null, after: null };
    $('pairName').value = '';
    ['Before', 'After'].forEach(w => {
      $('slot' + w).classList.remove('filled');
      $('bg' + w).style.backgroundImage = '';
      $('action' + w).innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        촬영하기`;
    });
    updateSaveButton();
  }

  // ============ TABS ============
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.screen;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $('screen-' + target).classList.add('active');
    });
  });

  // ============ GALLERY ============
  function renderGallery() {
    const empty = $('galleryEmpty');
    const gallery = $('gallery');
    if (state.pairs.length === 0) {
      gallery.innerHTML = '';
      gallery.appendChild(empty);
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';
    const grid = document.createElement('div');
    grid.className = 'pair-grid';
    state.pairs.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pair-card';
      const date = new Date(p.createdAt);
      const dateStr = `${date.getMonth()+1}.${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      card.innerHTML = `
        <div class="pair-thumb">
          <div class="half" data-label="BEFORE" style="background-image:url(${p.before})"></div>
          <div class="half" data-label="AFTER" style="background-image:url(${p.after})"></div>
        </div>
        <div class="pair-meta">
          <span class="pair-name">${escapeHtml(p.name)}</span>
          <span class="pair-date">${dateStr}</span>
        </div>
      `;
      card.addEventListener('click', () => openDetail(p.id));
      grid.appendChild(card);
    });
    gallery.innerHTML = '';
    gallery.appendChild(grid);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function updateCount() {
    $('pairCount').textContent = String(state.pairs.length).padStart(2, '0') + ' PAIRS';
  }

  // ============ DETAIL ============
  function openDetail(id) {
    const p = state.pairs.find(x => x.id === id);
    if (!p) return;
    state.activePairId = id;
    $('detailTitle').textContent = p.name;
    $('imgBefore').src = p.before;
    $('imgAfter').src = p.after;
    $('detailScreen').classList.add('active');
    setSplit(0.5);
  }

  function closeDetail() {
    $('detailScreen').classList.remove('active');
    state.activePairId = null;
  }

  $('btnDetailClose').addEventListener('click', closeDetail);

  // ============ DOWNLOAD ============
  function safeFilename(name) {
    return name.replace(/[^a-zA-Z0-9가-힣_-]/g, '_').slice(0, 40) || 'pair';
  }

  function downloadDataUrl(dataUrl, filename) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  $('btnDownloadBefore').addEventListener('click', () => {
    const p = state.pairs.find(x => x.id === state.activePairId);
    if (!p) return;
    downloadDataUrl(p.before, `${safeFilename(p.name)}_before.jpg`);
    showToast('Before 다운로드');
  });

  $('btnDownloadAfter').addEventListener('click', () => {
    const p = state.pairs.find(x => x.id === state.activePairId);
    if (!p) return;
    downloadDataUrl(p.after, `${safeFilename(p.name)}_after.jpg`);
    showToast('After 다운로드');
  });

  // ============ DELETE ============
  $('btnDelete').addEventListener('click', () => {
    $('confirmModal').classList.add('show');
  });
  $('btnCancelDelete').addEventListener('click', () => {
    $('confirmModal').classList.remove('show');
  });
  $('btnConfirmDelete').addEventListener('click', async () => {
    const id = state.activePairId;
    if (!id) return;
    await storage.deletePair(id);
    state.pairs = state.pairs.filter(p => p.id !== id);
    await storage.setList(state.pairs.map(p => p.id));
    $('confirmModal').classList.remove('show');
    closeDetail();
    renderGallery();
    updateCount();
    showToast('삭제됨');
  });

  // ============ COMPARE SLIDER ============
  const compare = $('compare');
  const divider = $('divider');
  const handle = $('handle');
  const afterWrap = $('afterWrap');
  let dragging = false;

  function setSplit(ratio) {
    ratio = Math.max(0, Math.min(1, ratio));
    const pct = ratio * 100;
    divider.style.left = pct + '%';
    handle.style.left = pct + '%';
    afterWrap.style.clipPath = `inset(0 0 0 ${pct}%)`;
  }

  function getX(e) {
    const t = e.touches ? e.touches[0] : e;
    return t.clientX;
  }

  function onMove(e) {
    if (!dragging) return;
    const rect = compare.getBoundingClientRect();
    const x = getX(e) - rect.left;
    setSplit(x / rect.width);
    e.preventDefault();
  }
  function onStart(e) { dragging = true; onMove(e); }
  function onEnd() { dragging = false; }

  compare.addEventListener('mousedown', onStart);
  compare.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);

  // ============ TOAST ============
  let toastTimer;
  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }
  function hideToast() { $('toast').classList.remove('show'); }

  // ============ INIT ============
  async function init() {
    if (storage.available) {
      const ids = await storage.getList();
      const loaded = [];
      for (const id of ids) {
        const p = await storage.getPair(id);
        if (p) loaded.push(p);
      }
      // Sort newest first
      loaded.sort((a, b) => b.createdAt - a.createdAt);
      state.pairs = loaded;
    }
    renderGallery();
    updateCount();
  }

  init();
</script>

</body>
</html>
